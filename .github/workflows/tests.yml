name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Fortran dependencies
        run: sudo apt-get update && sudo apt-get install -y gfortran libblas-dev liblapack-dev
      - name: Install package
        run: python -m pip install -e .[dev]
      - name: Run tests
        run: pytest -q
